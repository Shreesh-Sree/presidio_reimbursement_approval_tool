# Deploy to Azure Container Apps
#
# Required GitHub Secrets / Variables:
#   AZURE_CLIENT_ID       - App registration (service principal) client ID for OIDC federation
#   AZURE_TENANT_ID       - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID - Target Azure subscription
#   ACR_LOGIN_SERVER      - Container registry login server (e.g., presidioregistry.azurecr.io)
#   AZURE_STATIC_WEB_APPS_API_TOKEN - Deployment token for Azure Static Web Apps

name: Deploy Azure

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "ai_review_service/**"
      - "receipt_intelligence_service/**"
      - "policy_assistant_service/**"
      - "deployment/terraform-azure/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-production-deployment
  cancel-in-progress: false

env:
  RESOURCE_GROUP: presidio-reimbursement-rg
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          running-workflow-name: ci-gate
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-regexp: ^(backend|frontend|ai-review|receipt-intelligence|policy-assistant|terraform|secrets)$
          wait-interval: 15
          allowed-conclusions: success,skipped

  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: azure-production
    steps:
      - uses: actions/checkout@v6

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push presidio-api
        run: |
          docker build \
            --tag "$ACR_LOGIN_SERVER/presidio-api:$IMAGE_TAG" \
            --tag "$ACR_LOGIN_SERVER/presidio-api:latest" \
            backend
          docker push "$ACR_LOGIN_SERVER/presidio-api:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/presidio-api:latest"

      - name: Build and push presidio-ai-review
        run: |
          docker build \
            --tag "$ACR_LOGIN_SERVER/presidio-ai-review:$IMAGE_TAG" \
            --tag "$ACR_LOGIN_SERVER/presidio-ai-review:latest" \
            ai_review_service
          docker push "$ACR_LOGIN_SERVER/presidio-ai-review:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/presidio-ai-review:latest"

      - name: Build and push presidio-receipt-intelligence
        run: |
          docker build \
            --tag "$ACR_LOGIN_SERVER/presidio-receipt-intelligence:$IMAGE_TAG" \
            --tag "$ACR_LOGIN_SERVER/presidio-receipt-intelligence:latest" \
            receipt_intelligence_service
          docker push "$ACR_LOGIN_SERVER/presidio-receipt-intelligence:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/presidio-receipt-intelligence:latest"

      - name: Build and push presidio-policy-assistant
        run: |
          docker build \
            --tag "$ACR_LOGIN_SERVER/presidio-policy-assistant:$IMAGE_TAG" \
            --tag "$ACR_LOGIN_SERVER/presidio-policy-assistant:latest" \
            policy_assistant_service
          docker push "$ACR_LOGIN_SERVER/presidio-policy-assistant:$IMAGE_TAG"
          docker push "$ACR_LOGIN_SERVER/presidio-policy-assistant:latest"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: azure-production
    steps:
      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update presidio-api container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name presidio-api \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/presidio-api:${{ env.IMAGE_TAG }}"

      - name: Update presidio-ai-review container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name presidio-ai-review \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/presidio-ai-review:${{ env.IMAGE_TAG }}"

      - name: Update presidio-receipt-intelligence container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name presidio-receipt-intelligence \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/presidio-receipt-intelligence:${{ env.IMAGE_TAG }}"

      - name: Update presidio-policy-assistant container app
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name presidio-policy-assistant \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/presidio-policy-assistant:${{ env.IMAGE_TAG }}"

      - name: Report deployment status
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp list \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "[].{Name:name, FQDN:properties.configuration.ingress.fqdn, Status:properties.provisioningState}" \
              --output table

  terraform:
    name: terraform
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: contains(github.event.head_commit.modified, 'deployment/terraform-azure') || github.event_name == 'workflow_dispatch'
    environment: azure-production
    defaults:
      run:
        working-directory: deployment/terraform-azure
    steps:
      - uses: actions/checkout@v6

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"

      - name: Terraform init
        run: terraform init -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

  deploy-frontend:
    name: deploy-frontend
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: azure-production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build
          cp staticwebapp.config.json dist/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
          skip_api_build: true
