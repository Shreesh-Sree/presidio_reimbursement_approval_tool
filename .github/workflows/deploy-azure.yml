name: Deploy Azure production

on:
  push:
    branches: [main]
  workflow_dispatch:

# This workflow deploys the existing public Azure Container Apps and Static Web
# App. Supabase remains the database and authentication provider.
permissions:
  contents: read
  checks: read
  id-token: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  RESOURCE_GROUP: presidio-reimbursement-rg
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ci-gate:
    name: Wait for required CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI checks for this commit
        uses: lewagon/wait-on-check-action@ccfb013c15c8afb7bf2b7c028fb74dc5a068cccc # v1.3.4
        with:
          ref: ${{ github.sha }}
          running-workflow-name: Wait for required CI
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-regexp: ^(backend|frontend|ai-review|receipt-intelligence|policy-assistant|terraform|secrets|supply-chain)$
          wait-interval: 15
          allowed-conclusions: success,skipped

  schema-gate:
    name: Verify Supabase application schema
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: azure-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --no-dev
      - name: Require the deployed Supabase schema revision
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          revision="$(uv run alembic current | awk '/^[0-9][0-9][0-9]_/{ print $1; exit }')"
          if [ "$revision" != "009_tenant_workflows_outbox" ]; then
            echo "::error::Supabase application schema must be at 009_tenant_workflows_outbox before deployment. Apply schema maintenance separately, then re-run this deployment."
            exit 1
          fi

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: [ci-gate, schema-gate]
    environment: azure-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Login to Azure with GitHub OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Verify target registry access
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2
        with:
          inlineScript: |
            set -euo pipefail
            test -n "$ACR_LOGIN_SERVER"
            az acr show --name "${ACR_LOGIN_SERVER%%.*}" --query name --output tsv >/dev/null
      - name: Authenticate Docker to ACR
        run: |
          set -euo pipefail
          az acr login --name "${ACR_LOGIN_SERVER%%.*}"
      - name: Build and push release images
        run: |
          set -euo pipefail
          for entry in backend:presidio-api ai_review_service:presidio-ai-review receipt_intelligence_service:presidio-receipt-intelligence policy_assistant_service:presidio-policy-assistant; do
            context="${entry%%:*}"
            repository="${entry##*:}"
            image="$ACR_LOGIN_SERVER/$repository:$IMAGE_TAG"
            docker build --pull --tag "$image" "$context"
            docker push "$image"
          done

  deploy-services:
    name: Deploy Azure Container Apps
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: azure-production
    steps:
      - name: Login to Azure with GitHub OIDC
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Update the existing Container Apps
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2
        with:
          inlineScript: |
            set -euo pipefail
            for entry in presidio-reimburse-prod-api:presidio-api presidio-reimburse-prod-ai:presidio-ai-review presidio-reimburse-prod-rcpt:presidio-receipt-intelligence presidio-reimburse-prod-pol:presidio-policy-assistant; do
              app="${entry%%:*}"
              repository="${entry##*:}"
              az containerapp show --resource-group "$RESOURCE_GROUP" --name "$app" --query name --output tsv >/dev/null
              az containerapp update --resource-group "$RESOURCE_GROUP" --name "$app" --image "$ACR_LOGIN_SERVER/$repository:$IMAGE_TAG" --output none
            done
      - name: Verify the requested image is active
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2
        with:
          inlineScript: |
            set -euo pipefail
            for entry in presidio-reimburse-prod-api:presidio-api presidio-reimburse-prod-ai:presidio-ai-review presidio-reimburse-prod-rcpt:presidio-receipt-intelligence presidio-reimburse-prod-pol:presidio-policy-assistant; do
              app="${entry%%:*}"
              repository="${entry##*:}"
              expected="$ACR_LOGIN_SERVER/$repository:$IMAGE_TAG"
              actual="$(az containerapp show --resource-group "$RESOURCE_GROUP" --name "$app" --query 'properties.template.containers[0].image' --output tsv)"
              if [ "$actual" != "$expected" ]; then
                echo "::error::$app is running $actual, expected $expected"
                exit 1
              fi
            done

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [ci-gate, schema-gate]
    environment: azure-production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build static app
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          npm ci
          npm run build
          cp staticwebapp.config.json dist/
          test -f dist/index.html
      - name: Deploy static app
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
          skip_api_build: true

  verify:
    name: Verify API readiness
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-frontend]
    environment: azure-production
    steps:
      - name: Verify API health and readiness
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$API_BASE_URL"
          for endpoint in /api/health /api/ready; do
            curl --fail --silent --show-error --retry 6 --retry-all-errors --retry-delay 10 "$API_BASE_URL$endpoint" >/dev/null
          done
